<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Killa Links</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top left, #2a003f, #0a0014 60%);
}

.card {
    width: 380px;
    padding: 40px 30px;
    border-radius: 25px;
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    color: white;
}

.subtitle {
    font-size: 14px;
    letter-spacing: 3px;
    color: #b57cff;
    margin-bottom: 15px;
}

.title {
    font-size: 60px;
    font-weight: 800;
    background: linear-gradient(90deg, #e0b3ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 25px rgba(168,85,247,0.6);
    margin-bottom: 40px;
}

.button {
    width: 100%;
    padding: 18px;
    margin: 15px 0;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.button:hover {
    background: rgba(168,85,247,0.2);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(168,85,247,0.4);
}

.now-playing {
    margin-top: 35px;
    font-size: 14px;
    color: #aaa;
}

.song {
    color: #a855f7;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="card">
    <div class="subtitle">We are friends</div>
    <div class="title">HATCHSON & UNKNOWN</div>

  <a href="https://hatchson.github.io/HatchsonUnknown/KillaFiles/index.html"><button class="button">KILLA FILES</button></a>

</div>


</body>
</html>
